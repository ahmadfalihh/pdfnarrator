<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF-to-Video Narrator (Pro Batch + Music)</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    /* Loader Animation */
    .loader {
      border: 3px solid #334155;
      border-bottom-color: #6366f1;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
    }

    @keyframes rotation {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="bg-slate-950 text-slate-200 font-sans h-screen flex flex-col overflow-hidden">

  <div id="root" class="h-full flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- ERROR BOUNDARY ---
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, errorInfo: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, errorInfo: error };
      }
      componentDidCatch(error, errorInfo) {
        console.error("UI Mengalami Crash:", error, errorInfo);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="h-full w-full flex flex-col items-center justify-center p-8 bg-slate-950 text-white">
              <div className="max-w-2xl bg-red-900/20 border border-red-500 p-8 rounded-xl text-center">
                <h1 className="text-2xl font-bold text-red-400 mb-4">Aplikasi Berhenti Mendadak (Crash)</h1>
                <p className="text-slate-300 mb-4">Terjadi kesalahan pada sistem antarmuka. Anda bisa memuat ulang halaman ini.</p>
                <div className="text-xs text-red-300 bg-black/50 p-4 rounded mb-6 text-left overflow-auto max-h-32 font-mono">
                  {this.state.errorInfo?.toString()}
                </div>
                <button onClick={() => window.location.reload()} className="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded font-bold">Muat Ulang (Refresh)</button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // --- ICONS ---
    const Icons = {
      Video: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>,
      Settings: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06-.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
      Check: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="20 6 9 17 4 12"></polyline></svg>,
      Cloud: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path></svg>,
      LogOut: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
      X: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
      FileUp: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><polyline points="12 12 12 18"></polyline><polyline points="9 15 12 12 15 15"></polyline></svg>,
      FileText: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>,
      Play: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
      FolderPlus: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>,
      List: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>,
      Trash: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
      Music: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>,
      Youtube: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg>
    };

    // --- CONFIG & CONSTANTS ---
    const NARRATION_STYLES = [
      "Profesional & Formal", "Santai & Kasual", "Edukatif & Informatif",
      "Inspiratif & Memotivasi", "Humoris & Menyenangkan", "Dramatis & Epik",
      "Misterius & Bikin Penasaran", "Gaya Pembaca Berita", "Storytelling (Mendongeng)",
      "Puitis & Estetik", "Gaya Pitching Bisnis (Meyakinkan)"
    ];

    const NARRATOR_VOICES = [
      { id: "Aoede", name: "Aoede (Netral/Wanita)" }, { id: "Zephyr", name: "Zephyr (Tegas/Pria)" },
      { id: "Puck", name: "Puck (Ceria/Pria)" }, { id: "Charon", name: "Charon (Berat/Pria)" },
      { id: "Kore", name: "Kore (Lembut/Wanita)" }, { id: "Fenrir", name: "Fenrir (Kuat/Pria)" },
      { id: "Leda", name: "Leda (Tenang/Wanita)" }, { id: "Orus", name: "Orus (Wibawa/Pria)" },
      { id: "Callirrhoe", name: "Callirrhoe (Ramah/Wanita)" }, { id: "Autonoe", name: "Autonoe (Serius/Wanita)" },
      { id: "Enceladus", name: "Enceladus (Dalam/Pria)" }
    ];

    // --- HELPERS ---
    const pcmToWav = (base64PCM, sampleRate = 24000) => {
      const binaryString = window.atob(base64PCM);
      const len = binaryString.length;
      const pcmData = new Uint8Array(len);
      for (let i = 0; i < len; i++) pcmData[i] = binaryString.charCodeAt(i);
      const numChannels = 1, bitsPerSample = 16;
      const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
      const blockAlign = numChannels * (bitsPerSample / 8);
      const dataSize = pcmData.length;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);
      const writeString = (view, offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + dataSize, true);
      writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true); view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true); view.setUint16(34, bitsPerSample, true);
      writeString(view, 36, 'data'); view.setUint32(40, dataSize, true);
      new Uint8Array(buffer, 44).set(pcmData);
      return new Blob([buffer], { type: 'audio/wav' });
    };

    const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    function App() {
      const [pdfLibLoaded, setPdfLibLoaded] = useState(false);
      const [showSettings, setShowSettings] = useState(false);

      const [queue, setQueue] = useState([]);
      const [isProcessingBatch, setIsProcessingBatch] = useState(false);
      const [activeQueueIndex, setActiveQueueIndex] = useState(-1);

      // Music State
      const [bgmFile, setBgmFile] = useState(null);
      const [bgmVolume, setBgmVolume] = useState(0.15);

      const [googleToken, setGoogleToken] = useState(null);
      const [driveFolders, setDriveFolders] = useState([]);
      const [youtubeChannels, setYouTubeChannels] = useState([]);
      const [isCreatingFolder, setIsCreatingFolder] = useState(false);
      const [newFolderName, setNewFolderName] = useState('');

      const [appSettings, setAppSettings] = useState(() => {
        const saved = localStorage.getItem('narratorSettingsV6'); // Tetap gunakan key sama
        const parsed = saved ? JSON.parse(saved) : {};
        return {
          style: parsed.style || NARRATION_STYLES[0],
          voice: parsed.voice || NARRATOR_VOICES[0].id,
          apiKey1: parsed.apiKey1 || '',
          apiKey2: parsed.apiKey2 || '',
          apiKey3: parsed.apiKey3 || '',
          googleClientId: parsed.googleClientId || '',
          driveFolderId: parsed.driveFolderId || '',
          youtubeChannelId: parsed.youtubeChannelId || '',
          slideDelay: parsed.slideDelay || 15
        };
      });

      useEffect(() => {
        const pdfScript = document.createElement('script');
        pdfScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
        pdfScript.onload = () => {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
          setPdfLibLoaded(true);
        };
        document.body.appendChild(pdfScript);
      }, []);

      useEffect(() => {
        localStorage.setItem('narratorSettingsV6', JSON.stringify(appSettings));
      }, [appSettings]);

      // --- DRIVE FOLDER MANAGEMENT DENGAN ERROR LOGGING LENGKAP ---
      const fetchDriveFolders = async (token) => {
        try {
          const q = encodeURIComponent("mimeType='application/vnd.google-apps.folder' and trashed=false");
          const fields = encodeURIComponent("files(id,name)");
          const orderBy = encodeURIComponent("createdTime desc");

          const url = "https://www.googleapis.com/drive/v3/files?q=" + q + "&fields=" + fields + "&orderBy=" + orderBy + "&pageSize=100";

          const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });

          if (res.ok) {
            const data = await res.json();
            if (data.files && data.files.length > 0) {
              setDriveFolders(data.files);
            } else {
              alert("Folder Drive Anda kosong atau akses belum sepenuhnya diberikan. Pastikan Anda telah mencentang kotak akses penuh saat login.");
            }
          } else {
            const errData = await res.json();
            const detailedError = errData.error?.message || "Tidak ada pesan detail";

            if (res.status === 403) {
              if (detailedError.includes("has not been used in project") || detailedError.includes("disabled")) {
                alert("ERROR 403: GOOGLE DRIVE API BELUM DIAKTIFKAN!\n\nLangkah Perbaikan:\n1. Buka Google Cloud Console.\n2. Masuk ke menu 'APIs & Services' > 'Library'.\n3. Cari 'Google Drive API'.\n4. Klik 'Enable' (Aktifkan).\n5. Kembali ke sini dan coba lagi.");
              } else {
                alert("Akses ditolak (Error 403). Pesan Google: " + detailedError);
              }
            } else {
              console.error("API Error", errData);
              alert("Gagal membaca API Drive (Error " + res.status + "): " + detailedError);
            }
            setGoogleToken(null);
          }
        } catch (e) {
          console.error("Gagal mengambil folder:", e);
          alert("Error jaringan saat mengambil folder Google Drive: " + e.message);
        }
      };

      const fetchYouTubeChannels = async (token) => {
        try {
          const res = await fetch("https://www.googleapis.com/youtube/v3/channels?part=snippet&mine=true", {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          if (res.ok) {
            const data = await res.json();
            if (data.items && data.items.length > 0) {
              setYouTubeChannels(data.items);
            }
          } else {
            console.warn("Gagal mengambil channel YouTube (mungkin tidak ada channel atau scope ditolak)");
          }
        } catch (e) { console.error("Error mengambil channel YT:", e); }
      };

      const handleConnectDrive = () => {
        if (!window.google) return alert("Script Google Identity belum dimuat. Periksa internet/adblocker.");
        if (!appSettings.googleClientId) { setShowSettings(true); return alert("Masukkan Google Client ID dulu di menu Pengaturan."); }

        const client = window.google.accounts.oauth2.initTokenClient({
          client_id: appSettings.googleClientId.trim(),
          scope: 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/youtube.upload https://www.googleapis.com/auth/youtube.readonly',
          prompt: 'consent select_account',
          callback: (res) => {
            if (res && res.error) {
              alert("Proses login Google dibatalkan atau ditolak (Error: " + res.error + ").");
              return;
            }
            if (res && res.access_token) {
              setGoogleToken(res.access_token);
              fetchDriveFolders(res.access_token);
              fetchYouTubeChannels(res.access_token);
            }
          },
        });
        client.requestAccessToken();
      };

      const handleDisconnectDrive = () => {
        setGoogleToken(null);
        setDriveFolders([]);
        setYouTubeChannels([]);
      };

      const handleCreateFolder = async () => {
        if (!newFolderName.trim() || !googleToken) return;
        setIsCreatingFolder(true);
        try {
          const metadata = { name: newFolderName, mimeType: 'application/vnd.google-apps.folder' };
          const res = await fetch('https://www.googleapis.com/drive/v3/files', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + googleToken, 'Content-Type': 'application/json' },
            body: JSON.stringify(metadata)
          });
          const data = await res.json();
          if (data.id) {
            setDriveFolders([{ id: data.id, name: data.name }, ...driveFolders]);
            setAppSettings({ ...appSettings, driveFolderId: data.id });
            setNewFolderName('');
          } else if (data.error) {
            alert("Gagal membuat folder (Error: " + data.error.message + ")");
          }
        } catch (e) { alert("Gagal membuat folder. Pastikan Google Drive API telah diaktifkan."); }
        setIsCreatingFolder(false);
      };

      const handleFileSelection = (filesList) => {
        const validFiles = Array.from(filesList).filter(f => f.type === 'application/pdf');
        if (validFiles.length === 0) return alert("Mohon unggah file format PDF.");

        const filesToAdd = validFiles.slice(0, 30 - queue.length);
        if (validFiles.length > filesToAdd.length) alert("Maksimal 30 file sekaligus. File sisanya diabaikan.");

        const newQueueItems = filesToAdd.map(f => ({
          id: Math.random().toString(36).substring(7),
          file: f,
          status: 'PENDING',
          progress: '',
          slides: [],
          seo: null,
          videoUrl: null
        }));

        setQueue([...queue, ...newQueueItems]);
      };

      const handleDragOver = (e) => e.preventDefault();
      const handleDrop = (e) => {
        e.preventDefault();
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          handleFileSelection(e.dataTransfer.files);
        }
      };

      const removeQueueItem = (id) => {
        if (isProcessingBatch) return;
        setQueue(queue.filter(q => q.id !== id));
      };

      // --- PERBAIKAN LOGIKA ROTASI API ---
      const callApiWithFallback = async (urlTemplate, payload) => {
        const keysToTry = [appSettings.apiKey1, appSettings.apiKey2, appSettings.apiKey3].filter(k => k && k.trim());
        if (keysToTry.length === 0) throw new Error("NO_API_KEY");

        let lastError;
        for (let i = 0; i < keysToTry.length; i++) {
          try {
            const url = urlTemplate.replace('{KEY}', keysToTry[i]);
            const res = await fetch(url, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            if (res.status === 429) {
              console.warn(`Key ${i + 1} kena rate limit. Geser ke key selanjutnya...`);
              lastError = new Error("RATE_LIMIT");
              continue;
            }
            if (!res.ok) throw new Error("HTTP " + res.status);
            return await res.json();
          } catch (err) {
            lastError = err;
          }
        }
        throw lastError; // Jika semua key di rotasi gagal
      };

      // === GENERATOR DARURAT (EMERGENCY TEXT FALLBACK) ===
      const generateEmergencyScript = (rawText, slideIndex) => {
        let cleanText = rawText.replace(/[^a-zA-Z0-9 .,!?()]/g, " ").trim();
        if (!cleanText || cleanText.length < 5) {
          return `Pada bagian presentasi ini, kita memasuki slide ke ${slideIndex + 1}. Mari kita perhatikan detail visual dan data yang ditampilkan pada layar. Poin-poin pada slide ini memberikan konteks penting untuk topik yang sedang kita bahas.`;
        }
        let shortText = cleanText.substring(0, 100);
        return `Memasuki slide selanjutnya. Berikut adalah poin utama yang perlu kita garis bawahi: ${shortText}... Penjelasan lebih lanjut mengenai data dan rincian tersebut dapat kita lihat langsung pada struktur di layar.`;
      };


      const startBatchProcess = async () => {
        if (!appSettings.apiKey1 && !appSettings.apiKey2 && !appSettings.apiKey3) {
          setShowSettings(true);
          return alert("Wajib masukkan minimal 1 API Key Gemini di Pengaturan sebelum memulai.");
        }
        setIsProcessingBatch(true);

        for (let i = 0; i < queue.length; i++) {
          if (queue[i].status === 'DONE' || queue[i].status === 'ERROR') continue;

          setActiveQueueIndex(i);
          await processSingleItem(i);
        }

        setIsProcessingBatch(false);
        setActiveQueueIndex(-1);
        alert("Semua antrean selesai diproses!");
      };

      const updateItem = (index, updates) => {
        setQueue(prev => {
          const newQ = [...prev];
          newQ[index] = { ...newQ[index], ...updates };
          return newQ;
        });
      };

      const processSingleItem = async (index) => {
        const item = queue[index];
        const file = item.file;
        let extractedSlides = [];

        try {
          updateItem(index, { status: 'EXTRACTING', progress: 'Mengekstrak PDF (1080p Target)...' });
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          const totalPages = pdf.numPages;

          for (let i = 1; i <= totalPages; i++) {
            updateItem(index, { progress: `Memindai Halaman ${i}/${totalPages}...` });
            const page = await pdf.getPage(i);

            const viewport = page.getViewport({ scale: 3.0 });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;

            const imageUrl = canvas.toDataURL('image/jpeg', 0.85);
            const textContent = await page.getTextContent();
            const rawText = textContent.items.map(t => t.str).join(' ');

            extractedSlides.push({ id: i, image: imageUrl, originalText: rawText, script: '', audioUrl: null, duration: 4 });
          }

          updateItem(index, { status: 'AI_PROCESSING', slides: extractedSlides });

          for (let s = 0; s < extractedSlides.length; s++) {
            const slide = extractedSlides[s];
            let isSlideSuccess = false;
            let retryCount = 0;
            const maxRetries = 3;

            while (!isSlideSuccess && retryCount < maxRetries) {
              try {
                // A. Minta Teks Narasi
                updateItem(index, { progress: `AI Text Slide ${s + 1}/${extractedSlides.length} (Coba ${retryCount + 1})...` });
                const base64Image = slide.image.split(',')[1];
                const textPrompt = `Anda narator profesional. Jelaskan materi di GAMBAR SLIDE ini.\nSyarat:\n1. Jelaskan isi gambar/teks secara langsung.\n2. Gaya: ${appSettings.style}.\n3. Panjang WAJIB 70-100 kata.\n4. Bahasa Indonesia natural.`;

                const textRes = await callApiWithFallback("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={KEY}", {
                  contents: [{ parts: [{ text: textPrompt }, { inlineData: { mimeType: "image/jpeg", data: base64Image } }] }],
                  systemInstruction: { parts: [{ text: "Hanya berikan skrip narasi." }] }
                });

                const script = textRes.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!script || script.length < 20) throw new Error("Skrip terlalu pendek atau diblokir filter keamanan");
                slide.script = script.trim();

                // B. Minta Audio Suara (TTS)
                updateItem(index, { progress: `AI Audio Slide ${s + 1}/${extractedSlides.length}...` });
                const ttsRes = await callApiWithFallback("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key={KEY}", {
                  contents: [{ parts: [{ text: slide.script }] }],
                  generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: appSettings.voice } } } },
                  model: "gemini-2.5-flash-preview-tts"
                });

                const base64Audio = ttsRes.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (!base64Audio) throw new Error("Audio kosong (TTS Error)");

                const wavBlob = pcmToWav(base64Audio);
                const audioUrl = URL.createObjectURL(wavBlob);
                slide.audioUrl = audioUrl;

                // C. Kalkulasi Durasi
                const tempAudio = new Audio(audioUrl);
                await new Promise((resolve) => {
                  tempAudio.addEventListener('loadedmetadata', () => {
                    slide.duration = tempAudio.duration > 0 ? tempAudio.duration : 4;
                    resolve();
                  });
                  tempAudio.addEventListener('error', () => { slide.duration = 4; resolve(); });
                });

                isSlideSuccess = true; // Berhasil!
                updateItem(index, { slides: [...extractedSlides] });

              } catch (e) {
                console.warn(`Gagal slide ${s + 1} pada file ${file.name}. Mengaktifkan proteksi limit...`, e);
                retryCount++;

                // DEEP COOLDOWN: Jika error karena Rate Limit (429), paksa istirahat sesuai delay * 2.
                if (e.message === "RATE_LIMIT" || (e.message && e.message.includes("429"))) {
                  updateItem(index, { progress: `Batas Kuota API Tercapai. Pendinginan server ${appSettings.slideDelay * 2} detik...` });
                  await delay((appSettings.slideDelay * 2) * 1000);
                } else if (retryCount < maxRetries) {
                  updateItem(index, { progress: `Error koneksi. Menunggu 5 detik sebelum coba lagi...` });
                  await delay(5000);
                }
              }
            }

            // JIKA TETAP GAGAL SETELAH 3X RETRY -> GUNAKAN FALLBACK DARURAT
            if (!isSlideSuccess) {
              updateItem(index, { progress: `Menggunakan Skrip Darurat untuk Slide ${s + 1}...` });
              console.warn(`Menggunakan Fallback Darurat untuk Slide ${s + 1}`);

              slide.script = generateEmergencyScript(slide.originalText, s);

              try {
                const emergencyTtsRes = await callApiWithFallback("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key={KEY}", {
                  contents: [{ parts: [{ text: slide.script }] }],
                  generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: appSettings.voice } } } },
                  model: "gemini-2.5-flash-preview-tts"
                });
                const eBase64Audio = emergencyTtsRes.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (eBase64Audio) {
                  const eWavBlob = pcmToWav(eBase64Audio);
                  slide.audioUrl = URL.createObjectURL(eWavBlob);

                  const eTempAudio = new Audio(slide.audioUrl);
                  await new Promise((resolve) => {
                    eTempAudio.addEventListener('loadedmetadata', () => {
                      slide.duration = eTempAudio.duration > 0 ? eTempAudio.duration : 10;
                      resolve();
                    });
                    eTempAudio.addEventListener('error', () => { slide.duration = 10; resolve(); });
                  });
                } else {
                  slide.duration = 10;
                }
              } catch (emergencyAudioError) {
                console.error("TTS Darurat juga gagal", emergencyAudioError);
                slide.duration = 10; // Fallback 10 detik diam
              }

              updateItem(index, { slides: [...extractedSlides] });
            }

            // SMART PACING: Jeda antar setiap slide untuk menghormati Limit Requests yang diatur user
            if (s < extractedSlides.length - 1) {
              updateItem(index, { progress: `Jeda ritme keamanan API (${appSettings.slideDelay} detik)...` });
              await delay(appSettings.slideDelay * 1000);
            }
          }

          // === GENERATE SEO METADATA ===
          let seoMetadata = null;
          if (appSettings.youtubeChannelId && googleToken) {
            updateItem(index, { progress: 'Membuat SEO Metadata (Judul, Deskripsi, Tags) dgn Gemini...' });
            try {
              // Kombinasikan teks yang tersedia hingga limit aman untuk Gemini Flash (misal 15000 chars)
              const combinedText = extractedSlides.map(slide => slide.originalText || slide.script).join(' ').substring(0, 15000);
              const seoPrompt = `Berdasarkan teks presentasi berikut, buatkan metadata untuk unggah video ke YouTube.
Syarat:
1. title: Judul clickbait namun relevan SEO, maksimal 80 karakter.
2. description: Penjelasan sangat detail dan menarik sepanjang minimal 500 kata berdasarkan teks yang diberikan, SEO friendly. Taruh penjelasan naratif, sumber/referensi jika ada, dan hashtag di bawahnya.
3. tags: Array of strings berisi minimal 15 tag relevan dan trending.

Kembalikan HANYA format JSON valid seperti ini tanpa markdown text:
{
  "title": "Judul Menarik",
  "description": "Deskripsi YouTube...",
  "tags": ["Tag1", "Tag2"]
}

Teks presentasi:
${combinedText}`;

              const textRes = await callApiWithFallback("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={KEY}", {
                contents: [{ parts: [{ text: seoPrompt }] }],
                systemInstruction: { parts: [{ text: "Kamu adalah sistem otomatis AI pembuat metadata SEO YouTube. HANYA JAWAB DENGAN FORMAT JSON VALID." }] }
              });

              let rawJson = textRes.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
              rawJson = rawJson.replace(/```json/g, '').replace(/```/g, '').trim();
              seoMetadata = JSON.parse(rawJson);
              updateItem(index, { seo: seoMetadata });
            } catch (e) {
              console.error("Gagal generate SEO:", e);
              updateItem(index, { progress: 'Gagal generate SEO AI. Akan menggunakan metadata dasar...' });
            }
          }

          // --- VIDEO RENDERING & BGM MIXING ---
          updateItem(index, { status: 'RENDERING', progress: 'Merender Video + Musik (1080p)...' });
          const canvas = document.createElement('canvas');
          canvas.width = 1920;
          canvas.height = 1080;
          const ctx = canvas.getContext('2d');
          const stream = canvas.captureStream(30);

          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const dest = audioCtx.createMediaStreamDestination();
          stream.addTrack(dest.stream.getAudioTracks()[0]);

          // Setup Background Music (BGM)
          let bgmAudioEl = null;
          let bgmSource = null;
          let bgmGain = null;

          if (bgmFile) {
            const bgmUrl = URL.createObjectURL(bgmFile);
            bgmAudioEl = new Audio(bgmUrl);
            bgmAudioEl.loop = true;
            bgmSource = audioCtx.createMediaElementSource(bgmAudioEl);
            bgmGain = audioCtx.createGain();
            bgmGain.gain.value = bgmVolume;
            bgmSource.connect(bgmGain);
            bgmGain.connect(dest);
            bgmAudioEl.play().catch(e => console.warn("Gagal memutar BGM:", e));
          }

          const mimeType = MediaRecorder.isTypeSupported('video/webm; codecs=vp9') ? 'video/webm; codecs=vp9' : 'video/webm';
          const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8000000 });
          const chunks = [];
          recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

          const exportPromise = new Promise(resolve => {
            recorder.onstop = () => { resolve(new Blob(chunks, { type: mimeType })); };
          });

          recorder.start();

          for (let s = 0; s < extractedSlides.length; s++) {
            updateItem(index, { progress: `Merender Frame Slide ${s + 1}/${extractedSlides.length}...` });
            const slide = extractedSlides[s];
            const img = new Image();
            img.src = slide.image;
            await new Promise(r => img.onload = r);

            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
            const w = img.width * scale;
            const h = img.height * scale;
            ctx.drawImage(img, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);

            if (slide.audioUrl) {
              const audioEl = new Audio(slide.audioUrl);
              const source = audioCtx.createMediaElementSource(audioEl);
              source.connect(dest);
              await new Promise(r => { audioEl.onended = r; audioEl.play(); });
              source.disconnect();
            } else {
              await delay(slide.duration * 1000);
            }
          }

          recorder.stop();

          // Cleanup BGM
          if (bgmAudioEl) {
            bgmAudioEl.pause();
            URL.revokeObjectURL(bgmAudioEl.src);
          }

          const finalBlob = await exportPromise;
          const fileName = `HD_Narasi_${file.name.replace('.pdf', '')}.webm`;

          if (googleToken) {
            let driveSuccess = false;
            updateItem(index, { status: 'UPLOADING', progress: 'Menyimpan ke Google Drive (Resumable)...' });
            try {
              const metadata = { name: fileName, mimeType: 'video/webm' };
              if (appSettings.driveFolderId) metadata.parents = [appSettings.driveFolderId];

              const initRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable', {
                method: 'POST',
                headers: {
                  'Authorization': 'Bearer ' + googleToken,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(metadata)
              });

              if (!initRes.ok) {
                const errText = await initRes.text();
                throw new Error(`Upload Init Failed: ${initRes.status} - ${errText}`);
              }
              const uploadUrl = initRes.headers.get('Location');

              updateItem(index, { status: 'UPLOADING', progress: 'Sedang mengunggah file video besar ke Drive...' });
              const uploadRes = await fetch(uploadUrl, {
                method: 'PUT',
                body: finalBlob
              });

              if (!uploadRes.ok) throw new Error('Upload file gagal pada tahap akhir');

              driveSuccess = true;
              updateItem(index, { status: 'UPLOADING', progress: 'Sukses disimpan di Drive!' });
            } catch (err) {
              console.error("Kesalahan saat mengunggah Drive:", err);
              const url = URL.createObjectURL(finalBlob);
              const a = document.createElement('a'); a.href = url; a.download = fileName; a.click();
            }

            // === UPLOAD YOUTUBE ===
            if (appSettings.youtubeChannelId) {
              updateItem(index, { status: 'UPLOADING', progress: 'Mendaftarkan Video ke YouTube & Uploading...' });
              try {
                const ytMetadata = {
                  snippet: {
                    title: seoMetadata?.title || `Narasi Presentasi ${file.name.replace('.pdf', '')}`,
                    description: seoMetadata?.description || "Video presentasi yang digenerasi otomatis menggunakan PDF-to-Video Pro AI.",
                    tags: (seoMetadata?.tags || ["Presentasi", "AI", "PDF", "Pendidikan"]).slice(0, 20),
                    categoryId: "27" // Category: Education
                  },
                  status: {
                    privacyStatus: "private", // Default Private for safety
                    selfDeclaredMadeForKids: false
                  }
                };

                const initResYt = await fetch('https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status', {
                  method: 'POST',
                  headers: {
                    'Authorization': 'Bearer ' + googleToken,
                    'Content-Type': 'application/json',
                    'X-Upload-Content-Type': 'video/webm'
                  },
                  body: JSON.stringify(ytMetadata)
                });

                if (!initResYt.ok) {
                  const err = await initResYt.text();
                  throw new Error(`YouTube Init Failed: ${initResYt.status} - ${err}`);
                }

                const uploadUrlYt = initResYt.headers.get('Location');
                updateItem(index, { status: 'UPLOADING', progress: 'Mentransfer file video ke server YouTube...' });

                const uploadResYt = await fetch(uploadUrlYt, {
                  method: 'PUT',
                  body: finalBlob
                });

                if (!uploadResYt.ok) {
                  const err = await uploadResYt.text();
                  throw new Error(`YouTube Upload Failed: ${uploadResYt.status} - ${err}`);
                }

                updateItem(index, { status: 'DONE', progress: driveSuccess ? 'Sukses Upload: Google Drive & YouTube (Draf Pribadi)!' : 'Gagal Drive, Namun Sukses YouTube!' });
              } catch (err) {
                console.error("Gagal YouTube Upload", err);
                updateItem(index, { status: 'ERROR', progress: driveSuccess ? `Sukses Drive. Gagal YouTube: ${err.message}` : `Gagal Keseluruhan: ${err.message}` });
              }
            } else {
              updateItem(index, { status: 'DONE', progress: driveSuccess ? 'Selesai & Tersedia di Drive!' : 'Selesai Tersimpan Lokal (Drive Gagal).' });
            }

          } else {
            const url = URL.createObjectURL(finalBlob);
            const a = document.createElement('a'); a.href = url; a.download = fileName; a.click();
            updateItem(index, { status: 'DONE', progress: 'Selesai & Diunduh Lokal!' });
          }

        } catch (error) {
          console.error(error);
          updateItem(index, { status: 'ERROR', progress: 'Error: ' + error.message });
        }
      };

      return (
        <div className="h-full flex flex-col relative">

          {/* HEADER */}
          <header className="bg-slate-900 border-b border-slate-800 p-4 flex items-center justify-between shadow-sm z-10 flex-wrap gap-4 shrink-0">
            <div className="flex items-center gap-3">
              <div className="bg-indigo-600 p-2 rounded-lg"><Icons.Video className="w-5 h-5 text-white" /></div>
              <div>
                <h1 className="text-xl font-bold text-white tracking-tight">PDF-to-Video <span className="text-indigo-400">Pro</span></h1>
                <p className="text-xs text-slate-400">Batch Upload & 1080p Engine</p>
              </div>
            </div>
            <div className="flex items-center gap-3 flex-wrap">
              {googleToken ? (
                <div className="flex items-center gap-2">
                  <select
                    value={appSettings.driveFolderId}
                    onChange={(e) => setAppSettings({ ...appSettings, driveFolderId: e.target.value })}
                    className="bg-slate-800 border border-emerald-900/50 rounded-md px-2 py-1.5 text-xs text-emerald-300 focus:outline-none max-w-[120px] sm:max-w-[180px]"
                    title="Pilih folder tujuan Drive"
                  >
                    <option value="">-- Root Drive --</option>
                    {driveFolders.map(f => <option key={f.id} value={f.id}>📁 {f.name}</option>)}
                  </select>

                  <select
                    value={appSettings.youtubeChannelId}
                    onChange={(e) => setAppSettings({ ...appSettings, youtubeChannelId: e.target.value })}
                    className="bg-slate-800 border border-red-900/50 rounded-md px-2 py-1.5 text-xs text-red-300 focus:outline-none max-w-[120px] sm:max-w-[180px]"
                    title="Pilih Channel YouTube Upload"
                  >
                    <option value="">-- No YouTube --</option>
                    {youtubeChannels.map(c => <option key={c.id} value={c.id}>📺 {c.snippet.title}</option>)}
                  </select>

                  <button onClick={handleDisconnectDrive} className="flex items-center gap-1 bg-emerald-900/30 hover:bg-emerald-900/50 text-emerald-400 px-3 py-1.5 rounded-md font-medium transition-all text-xs border border-emerald-800/50" title="Putuskan Drive & YT">
                    <Icons.Check className="w-3 h-3" /> Aktif
                  </button>
                </div>
              ) : (
                <button onClick={handleConnectDrive} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-2 rounded-md font-medium transition-all text-xs border border-slate-700">
                  <Icons.Cloud className="w-4 h-4" /> Hubungkan Drive & YT
                </button>
              )}

              <div className="w-px h-6 bg-slate-800 mx-1"></div>
              <button onClick={() => setShowSettings(true)} className="flex items-center gap-2 text-slate-400 hover:text-white transition-colors p-2" title="Pengaturan">
                <Icons.Settings className="w-5 h-5" />
              </button>
            </div>
          </header>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 flex flex-col md:flex-row overflow-hidden bg-slate-950 relative">

            {/* LEFT PANEL: BATCH QUEUE & UPLOAD */}
            <div
              onDragOver={handleDragOver}
              onDrop={handleDrop}
              className={`w-full md:w-[400px] border-r border-slate-800 flex flex-col bg-slate-900 shrink-0 ${activeQueueIndex !== -1 && window.innerWidth < 768 ? 'hidden' : 'flex'}`}
            >

              <div className="p-4 border-b border-slate-800">
                <label className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-lg font-medium cursor-pointer transition-colors shadow-lg flex items-center justify-center gap-2" style={{ opacity: isProcessingBatch ? 0.5 : 1, pointerEvents: isProcessingBatch ? 'none' : 'auto' }}>
                  <Icons.FileUp className="w-5 h-5" /> Tambah PDF (Batch)
                  <input type="file" accept="application/pdf" multiple className="hidden" onChange={(e) => handleFileSelection(e.target.files)} disabled={!pdfLibLoaded || isProcessingBatch} />
                </label>
              </div>

              {/* Queue List */}
              <div className="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-2">
                {queue.length === 0 && (
                  <div className="text-center text-slate-500 mt-10 p-4">
                    <Icons.List className="w-10 h-10 mx-auto mb-2 opacity-50" />
                    <p className="text-sm">Belum ada file. Unggah PDF atau Drag & Drop ke sini untuk memulai antrean.</p>
                  </div>
                )}
                {queue.map((item, idx) => (
                  <div key={item.id} className={`p-3 rounded-lg border ${activeQueueIndex === idx ? 'bg-indigo-900/20 border-indigo-500' : 'bg-slate-800 border-slate-700'}`}>
                    <div className="flex justify-between items-start mb-1">
                      <h4 className="text-sm font-semibold text-white truncate pr-2">{item.file.name}</h4>
                      {!isProcessingBatch && (
                        <button onClick={() => removeQueueItem(item.id)} className="text-slate-500 hover:text-red-400"><Icons.Trash className="w-4 h-4" /></button>
                      )}
                    </div>
                    <div className="flex justify-between items-center text-xs">
                      <span className={`px-2 py-0.5 rounded font-medium ${item.status === 'DONE' ? 'bg-emerald-500/20 text-emerald-400' :
                          item.status === 'ERROR' ? 'bg-red-500/20 text-red-400' :
                            item.status !== 'PENDING' ? 'bg-indigo-500/20 text-indigo-400' : 'bg-slate-700 text-slate-400'
                        }`}>
                        {item.status}
                      </span>
                      <span className="text-slate-500">{(item.file.size / 1024 / 1024).toFixed(1)} MB</span>
                    </div>
                    {item.progress && <p className="text-[10px] text-indigo-300 mt-2 truncate">{item.progress}</p>}
                  </div>
                ))}
              </div>

              {/* Start Batch Button */}
              {queue.length > 0 && (
                <div className="p-4 border-t border-slate-800 bg-slate-950">
                  <button
                    onClick={startBatchProcess}
                    disabled={isProcessingBatch}
                    className="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 text-white font-bold py-3 rounded-lg flex justify-center items-center gap-2 transition-colors"
                  >
                    {isProcessingBatch ? <><span className="loader w-5 h-5 border-2"></span> Memproses...</> : <><Icons.Play className="w-5 h-5 fill-current" /> Jalankan {queue.filter(q => q.status === 'PENDING').length} File</>}
                  </button>
                </div>
              )}
            </div>

            {/* RIGHT PANEL: LIVE MONITOR / DASHBOARD */}
            <div
              onDragOver={handleDragOver}
              onDrop={handleDrop}
              className="flex-1 flex flex-col overflow-hidden bg-slate-950 relative"
            >
              {activeQueueIndex === -1 ? (
                // DASHBOARD KETIKA IDLE
                <div className="flex-1 flex items-center justify-center p-8 overflow-y-auto custom-scrollbar">
                  <div className="max-w-xl w-full">
                    <h2 className="text-2xl font-bold text-white mb-6 text-center">⚙️ Preferensi AI & Video</h2>
                    <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl space-y-5 relative overflow-hidden">
                      <div className="absolute top-0 right-0 p-4 text-slate-800 opacity-20 pointer-events-none"><Icons.Settings className="w-32 h-32" /></div>
                      <div className="relative z-10">
                        <label className="block text-sm font-medium text-slate-300 mb-2">Gaya Bahasa Cerita</label>
                        <select value={appSettings.style} onChange={(e) => setAppSettings({ ...appSettings, style: e.target.value })} className="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500">
                          {NARRATION_STYLES.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                      <div className="relative z-10">
                        <label className="block text-sm font-medium text-slate-300 mb-2">Pilihan Suara (Voice)</label>
                        <select value={appSettings.voice} onChange={(e) => setAppSettings({ ...appSettings, voice: e.target.value })} className="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500">
                          {NARRATOR_VOICES.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                        </select>
                      </div>

                      {/* MUSIK LATAR (BGM) SETUP */}
                      <div className="relative z-10 pt-4 border-t border-slate-800">
                        <label className="block text-sm font-medium text-slate-300 mb-2 flex items-center gap-2">
                          <Icons.Music className="w-4 h-4 text-indigo-400" /> Latar Musik (BGM) Opsional
                        </label>
                        <input
                          type="file"
                          accept="audio/*"
                          onChange={(e) => setBgmFile(e.target.files[0])}
                          className="w-full text-xs text-slate-400 file:mr-3 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-900/30 file:text-indigo-400 hover:file:bg-indigo-900/50 cursor-pointer focus:outline-none"
                        />
                        {bgmFile && (
                          <div className="mt-4 flex items-center gap-3 bg-slate-950 p-3 rounded-lg border border-slate-800 shadow-inner">
                            <span className="text-xs font-semibold text-slate-400 w-20">Vol: {Math.round(bgmVolume * 100)}%</span>
                            <input
                              type="range" min="0" max="1" step="0.05"
                              value={bgmVolume}
                              onChange={e => setBgmVolume(parseFloat(e.target.value))}
                              className="flex-1 accent-indigo-500 cursor-pointer"
                            />
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              ) : (
                // LIVE MONITOR KETIKA PROCESSING
                <div className="flex-1 flex flex-col items-center justify-center p-6">
                  <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
                    <span className="loader w-4 h-4 border-2"></span> Memproses: {queue[activeQueueIndex].file.name}
                  </h3>

                  <div className="aspect-video w-full max-w-3xl bg-black rounded-xl shadow-2xl border border-slate-800 flex items-center justify-center overflow-hidden">
                    {queue[activeQueueIndex].slides.length > 0 ? (
                      <img src={queue[activeQueueIndex].slides[queue[activeQueueIndex].slides.length - 1].image} className="w-full h-full object-contain opacity-80" />
                    ) : (
                      <Icons.FileText className="w-16 h-16 text-slate-700 animate-pulse" />
                    )}
                  </div>

                  <div className="mt-6 w-full max-w-3xl bg-slate-900 border border-slate-800 rounded-xl p-4">
                    <p className="text-sm text-indigo-300 font-mono mb-2">{queue[activeQueueIndex].progress}</p>
                    <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                      <div className="bg-indigo-500 h-full animate-pulse w-full"></div>
                    </div>

                    {queue[activeQueueIndex].seo && (
                      <div className="mt-4 text-[10px] text-slate-400 bg-slate-950 p-3 rounded border border-slate-800 max-h-32 overflow-y-auto custom-scrollbar">
                        <strong className="text-white text-xs block border-b border-slate-800 pb-1 mb-2">✨ SEO Metadata (YouTube)</strong>
                        <strong className="text-red-300 block mb-1">Judul: {queue[activeQueueIndex].seo.title}</strong>
                        <p className="whitespace-pre-wrap">{queue[activeQueueIndex].seo.description}</p>
                        <div className="mt-2 text-indigo-400 break-words">{queue[activeQueueIndex].seo.tags?.map(t => `#${t.replace(/\s/g, '_')}`).join(' ')}</div>
                      </div>
                    )}
                    {queue[activeQueueIndex].slides.length > 0 && queue[activeQueueIndex].slides[queue[activeQueueIndex].slides.length - 1].script && !queue[activeQueueIndex].seo && (
                      <div className="mt-4 text-xs text-slate-400 bg-slate-950 p-3 rounded border border-slate-800 max-h-24 overflow-y-auto custom-scrollbar">
                        <strong className="text-slate-300">Skrip Terakhir:</strong> {queue[activeQueueIndex].slides[queue[activeQueueIndex].slides.length - 1].script}
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

          </main>

          {/* SETTINGS MODAL */}
          {showSettings && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-slate-900 border border-slate-700 rounded-xl w-full max-w-2xl shadow-2xl flex flex-col max-h-[90vh]">
                <div className="p-4 border-b border-slate-800 flex justify-between items-center">
                  <h2 className="font-semibold text-white flex items-center gap-2"><Icons.Settings className="w-5 h-5" /> Pengaturan Sistem</h2>
                  <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-white"><Icons.X className="w-5 h-5" /></button>
                </div>

                <div className="p-6 overflow-y-auto custom-scrollbar space-y-6">
                  {/* API Keys */}
                  <div className="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                    <h4 className="text-sm font-semibold text-indigo-300 mb-2">Kunci API Gemini (Wajib untuk Batch)</h4>
                    <p className="text-xs text-slate-400 mb-3">Masukkan minimal 1 kunci. Jika gagal (limit), sistem akan mencoba kunci berikutnya otomatis.</p>
                    <div className="space-y-2 mb-4">
                      <input type="password" placeholder="API Key Utama" value={appSettings.apiKey1} onChange={e => setAppSettings({ ...appSettings, apiKey1: e.target.value })} className="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm text-white" />
                      <input type="password" placeholder="API Key Cadangan 1" value={appSettings.apiKey2} onChange={e => setAppSettings({ ...appSettings, apiKey2: e.target.value })} className="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm text-white" />
                      <input type="password" placeholder="API Key Cadangan 2" value={appSettings.apiKey3} onChange={e => setAppSettings({ ...appSettings, apiKey3: e.target.value })} className="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm text-white" />
                    </div>

                    <label className="block text-xs font-semibold text-slate-300 mb-1 mt-4">Jeda Antar Slide (Mencegah Error 429 Limit)</label>
                    <div className="flex items-center gap-2">
                      <input type="number" min="0" max="60" value={appSettings.slideDelay} onChange={e => setAppSettings({ ...appSettings, slideDelay: parseInt(e.target.value) || 0 })} className="w-24 bg-slate-950 border border-slate-700 rounded p-2 text-sm text-white" />
                      <span className="text-xs text-slate-400">detik (Rekomendasi: min. 10 detik jika pakai 1 API Key)</span>
                    </div>
                  </div>

                  {/* Drive Config */}
                  <div className="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                    <h4 className="text-sm font-semibold text-emerald-300 mb-2">Konfigurasi Google Drive</h4>
                    <input type="text" placeholder="Google OAuth Client ID" value={appSettings.googleClientId} onChange={e => setAppSettings({ ...appSettings, googleClientId: e.target.value })} className="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm text-white mb-2" />
                    <p className="text-xs text-amber-400 mt-2 italic">Pastikan email Anda sudah masuk daftar "Test users" di Google Cloud Console, DAN "Google Drive API" sudah diaktifkan (Enable) di menu APIs & Services.</p>

                    {googleToken && (
                      <div className="mt-4 pt-4 border-t border-slate-700">
                        <label className="block text-xs font-medium text-slate-300 mb-2">Buat Folder Baru di Drive</label>
                        <div className="flex gap-2">
                          <input type="text" placeholder="Nama Folder (misal: Video Project A)" value={newFolderName} onChange={e => setNewFolderName(e.target.value)} className="flex-1 bg-slate-950 border border-slate-700 rounded p-2 text-sm text-white" />
                          <button onClick={handleCreateFolder} disabled={isCreatingFolder || !newFolderName} className="bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white px-4 rounded text-sm font-medium flex items-center gap-1"><Icons.FolderPlus className="w-4 h-4" /> Buat</button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                <div className="p-4 border-t border-slate-800 flex justify-end">
                  <button onClick={() => setShowSettings(false)} className="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-lg font-medium">Selesai</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>

</html>
